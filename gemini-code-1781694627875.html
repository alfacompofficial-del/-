<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stunning Glass Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #311042);
            overflow: hidden;
            position: relative;
        }

        /* Декоративные светящиеся сферы на фоне */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }
        body::before {
            background: rgba(139, 92, 246, 0.4);
            top: 15%;
            left: 20%;
            animation: float 6s ease-in-out infinite alternate;
        }
        body::after {
            background: rgba(236, 72, 153, 0.3);
            bottom: 15%;
            right: 20%;
            animation: float 6s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(30px); }
        }

        /* Контейнер калькулятора (Эффект стекла) */
        .calculator {
            position: relative;
            z-index: 1;
            width: 360px;
            padding: 25px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Экран */
        .display-container {
            margin-bottom: 25px;
            position: relative;
        }

        #display {
            width: 100%;
            height: 80px;
            border: none;
            outline: none;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 15px 20px;
            font-size: 2rem;
            color: #f8fafc;
            text-align: right;
            font-weight: 300;
            letter-spacing: 1px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Сетка кнопок */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        /* Общий стиль кнопок */
        button {
            padding: 20px;
            font-size: 1.25rem;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
            user-select: none;
        }

        /* Эффект при наведении и нажатии */
        button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Яркие операторы (розовый градиент) */
        .operator {
            background: linear-gradient(135deg, #ec4899, #d946ef);
            color: #fff;
            font-weight: 600;
            border: none;
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.2);
        }
        .operator:hover {
            background: linear-gradient(135deg, #f472b6, #e879f9);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
        }

        /* Кнопка "Равно" (фиолетовый градиент) */
        .equal {
            grid-column: span 2;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: #fff;
            font-weight: 600;
            border: none;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }
        .equal:hover {
            background: linear-gradient(135deg, #a78bfa, #818cf8);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
        }

        /* Кнопки сброса (серые/функциональные) */
        .clear {
            color: #fda4af;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .clear:hover {
            background: rgba(239, 68, 68, 0.25);
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display-container">
            <input type="text" id="display" placeholder="0" readonly>
        </div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="appendValue('/')" class="operator">÷</button>
            <button onclick="appendValue('*')" class="operator">×</button>
            <button onclick="backspace()" class="clear">⌫</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('-')" class="operator">−</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('+')" class="operator">+</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('.')">.</button>

            <button onclick="appendValue('0')">0</button>
            <button onclick="calculate()" class="equal">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function appendValue(value) {
            // Замена стандартных знаков для красоты на экране
            if (display.value === 'Error') display.value = '';
            display.value += value;
        }

        function clearDisplay() {
            display.value = '';
        }

        function backspace() {
            if (display.value === 'Error') {
                display.value = '';
            } else {
                display.value = display.value.slice(0, -1);
            }
        }

        function calculate() {
            try {
                // Простая валидация и вычисление выражения
                if (display.value) {
                    // Используем Function вместо eval для чуть большей безопасности в простых проектах
                    let result = new Function('return ' + display.value)();
                    
                    // Округляем длинные дроби, чтобы не ломать верстку
                    if (result % 1 !== 0) {
                        result = Math.round(result * 1000000) / 1000000;
                    }
                    display.value = result;
                }
            } catch (error) {
                display.value = 'Error';
            }
        }

        // Поддержка ввода с клавиатуры
        document.addEventListener('keydown', (e) => {
            if ((e.key >= '0' && e.key <= '9') || e.key === '.' || e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') {
                appendValue(e.key);
            } else if (e.key === 'Enter' || e.key === '=') {
                calculate();
            } else if (e.key === 'Backspace') {
                backspace();
            } else if (e.key === 'Escape') {
                clearDisplay();
            }
        });
    </script>
</body>
</html>
